<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auren Joyería | Pulseras, Charms y Joyería en Manzanillo</title>
  <meta name="description" content="Subpágina de joyería de Auren: pulseras, charms y piezas elegantes en Manzanillo. Colores terracota, beige, rosa pastel y dorado.">
  <link rel="canonical" href="https://arturoyenrique.com/joyeria.html">
  <meta property="og:title" content="Auren - Joyería en Manzanillo">
  <meta property="og:description" content="Pulseras, charms y joyería con estilo boutique creados por Arturo y Enrique.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="img/logos/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;700&family=Forum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="joyeria.css">
</head>
<body class="page-joyeria">
  <div id="site-header"></div>

  <section class="hero" style="background-image:url('img/heroes/hero-joyeria.jpg');">
    <div class="hero-content">
      <img src="img/logos/logotipo.png" alt="Auren logotipo" class="logo-hero">
      <p class="hero-tagline">Joyería delicada para resaltar tu estilo</p>
    </div>
  </section>

  <nav class="categories">
    <a class="chip" href="ropa.html">Ropa</a>
    <a class="chip active" href="joyeria.html">Joyería</a>
  </nav>

  <main>
    <section class="joyeria">
      <h1 class="title">Joyería Auren en Manzanillo</h1>
      <p class="joyeria-intro">Pulseras, charms y joyería pensada por Arturo y Enrique para mujeres que aman los detalles elegantes, cálidos y femeninos.</p>

      <div class="beam-intro" aria-hidden="true"></div>

      <section class="carousel-block">
        <h2 class="subtitle">Colección White</h2>
        <div class="carousel" id="carousel-white" aria-roledescription="carousel" aria-label="Colección White" tabindex="0">
          <button class="nav prev" aria-label="Anterior">‹</button>
          <div class="track" role="list"></div>
          <button class="nav next" aria-label="Siguiente">›</button>
        </div>
        <div class="dots" id="dots-white" aria-label="Paginación"></div>
      </section>

      <section class="carousel-block">
        <h2 class="subtitle">Colección Black</h2>
        <div class="carousel" id="carousel-black" aria-roledescription="carousel" aria-label="Colección Black" tabindex="0">
          <button class="nav prev" aria-label="Anterior">‹</button>
          <div class="track" role="list"></div>
          <button class="nav next" aria-label="Siguiente">›</button>
        </div>
        <div class="dots" id="dots-black" aria-label="Paginación"></div>
      </section>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="app.js"></script>
  <script src="joyeria.js"></script>
</body>
</html>
